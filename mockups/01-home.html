<div class="stage">
<div class="screen-label">Home / Tests</div>
<div style="background:#F1ECE2;border-radius:12px;padding:1.5rem;display:flex;justify-content:center;">
  <div style="width:340px;background:#FBF9F4;border:0.5px solid rgba(0,0,0,0.12);border-radius:16px;padding:16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <span style="font-size:18px;font-weight:500;">Kilnkeep</span>
      <i class="ti ti-settings" style="font-size:20px;color:#6B655C;" aria-hidden="true"></i>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;">
      <div style="background:#F1ECE2;border-radius:8px;padding:10px;"><div style="font-size:11px;color:#6B655C;">Tests</div><div style="font-size:20px;font-weight:500;">47</div></div>
      <div style="background:#F6E9D2;border-radius:8px;padding:10px;"><div style="font-size:11px;color:#8A5A2B;">Keepers</div><div style="font-size:20px;font-weight:500;color:#8A5A2B;"><i class="ti ti-star" style="font-size:13px;" aria-hidden="true"></i> 12</div></div>
      <div style="background:#F1ECE2;border-radius:8px;padding:10px;"><div style="font-size:11px;color:#6B655C;">Open</div><div style="font-size:20px;font-weight:500;">5</div></div>
    </div>
    <input type="text" placeholder="Search tests" style="width:100%;margin-bottom:10px;" />
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
      <button style="white-space:nowrap;"><i class="ti ti-plus" aria-hidden="true"></i> New test</button>
      <button style="white-space:nowrap;background:#F6E9D2;color:#8A5A2B;border-color:#C98A3C;"><i class="ti ti-wand" aria-hidden="true"></i> Assistant</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;">
      <span style="font-size:11px;background:#F1ECE2;color:#6B655C;padding:4px 8px;border-radius:8px;">Cone</span>
      <span style="font-size:11px;background:#F1ECE2;color:#6B655C;padding:4px 8px;border-radius:8px;">Glaze</span>
      <span style="font-size:11px;background:#F1ECE2;color:#6B655C;padding:4px 8px;border-radius:8px;">Result</span>
      <span style="font-size:11px;background:#F1ECE2;color:#6B655C;padding:4px 8px;border-radius:8px;">Clay</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div style="border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;overflow:hidden;"><div style="height:76px;background:#F1ECE2;display:flex;align-items:center;justify-content:center;"><i class="ti ti-photo" style="font-size:24px;color:#9A9388;" aria-hidden="true"></i></div><div style="padding:8px 10px;"><div style="font-size:13px;font-weight:500;">Tenmoku A</div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;"><span style="font-size:11px;background:#F1ECE2;color:#6B655C;padding:2px 6px;border-radius:8px;">cone 6</span><span style="width:10px;height:10px;border-radius:50%;background:#4A5D23;display:inline-block;"></span></div></div></div>
      <div style="border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;overflow:hidden;"><div style="height:76px;background:#F1ECE2;display:flex;align-items:center;justify-content:center;"><i class="ti ti-photo" style="font-size:24px;color:#9A9388;" aria-hidden="true"></i></div><div style="padding:8px 10px;"><div style="font-size:13px;font-weight:500;">Celadon test <span style="font-size:10px;color:#8A5A2B;">&#8627; iteration</span></div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;"><span style="font-size:11px;background:#F1ECE2;color:#6B655C;padding:2px 6px;border-radius:8px;">cone 6</span><span style="width:10px;height:10px;border-radius:50%;background:#C98A3C;display:inline-block;"></span></div></div></div>
      <div style="border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;overflow:hidden;"><div style="height:76px;background:#F1ECE2;display:flex;align-items:center;justify-content:center;"><i class="ti ti-photo" style="font-size:24px;color:#9A9388;" aria-hidden="true"></i></div><div style="padding:8px 10px;"><div style="font-size:13px;font-weight:500;">Shino B</div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;"><span style="font-size:11px;background:#F1ECE2;color:#6B655C;padding:2px 6px;border-radius:8px;">cone 10</span><span style="width:10px;height:10px;border-radius:50%;background:#B5654A;display:inline-block;"></span></div></div></div>
      <div style="border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;overflow:hidden;"><div style="height:76px;background:#F1ECE2;display:flex;align-items:center;justify-content:center;"><i class="ti ti-photo" style="font-size:24px;color:#9A9388;" aria-hidden="true"></i></div><div style="padding:8px 10px;"><div style="font-size:13px;font-weight:500;">Ash glaze</div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;"><span style="font-size:11px;background:#F1ECE2;color:#6B655C;padding:2px 6px;border-radius:8px;">cone 10</span><span style="width:10px;height:10px;border-radius:50%;background:#B5654A;display:inline-block;"></span></div></div></div>
    </div>
  </div>
</div>
</div>
