# Supabase CLI config for Kilnkeep.
# Set project_id to your linked project ref (a grown-up creates the project).
# Local dev: `supabase start` then `supabase db reset` applies migrations/ in order.
# Remote:    `supabase link --project-ref <ref>` then `supabase db push`.

project_id = "kilnkeep"

[db]
# Must match the remote major version (Supabase is currently on 15).
major_version = 15

[auth]
# Email + password only (see docs/security.md: only email + password collected).
enable_signup = true

[auth.email]
enable_signup = true
# Require email confirmation before first sign-in (recommended for production).
enable_confirmations = true

[storage]
enabled = true

# --- Edge Functions ---
# Most functions require a signed-in caller, so verify_jwt stays ON (default).
# The Stripe webhook has NO user JWT — its authenticity is the Stripe signature —
# so it MUST disable JWT verification or every delivery 401s.
[functions.stripe-webhook]
verify_jwt = false

# glaze-suggest, create-checkout, and the admin-* functions keep verify_jwt = true
# (default) and additionally re-verify the caller (and owner) inside the handler.
